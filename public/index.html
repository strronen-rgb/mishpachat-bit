<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6C63FF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>משפחביט — ניהול כספים משפחתי</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #6C63FF; --primary-dark: #5A52D5; --primary-light: #8B83FF;
            --success: #4CAF50; --success-dark: #388E3C; --danger: #FF5252; --danger-dark: #D32F2F;
            --warning: #FF9800; --warning-dark: #E65100;
            --bg: #F0F2F5; --card: #FFFFFF; --text: #1A1A2E; --text-light: #888; --border: #E8E8E8;
            --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 8px 30px rgba(0,0,0,0.10);
            --radius: 16px; --radius-sm: 10px; --radius-lg: 20px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        body { font-family: 'Heebo', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* ===== AVATAR SYSTEM ===== */
        .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .avatar .initials { color: white; font-weight: 700; }
        .avatar-xs { width: 32px; height: 32px; font-size: 0.75em; }
        .avatar-sm { width: 40px; height: 40px; font-size: 0.85em; }
        .avatar-md { width: 56px; height: 56px; font-size: 1.2em; }
        .avatar-lg { width: 80px; height: 80px; font-size: 1.8em; }
        .avatar-xl { width: 120px; height: 120px; font-size: 2.5em; }
        .avatar-2xl { width: 160px; height: 160px; font-size: 3.2em; }
        .avatar-blue { background: linear-gradient(135deg, #667eea, #764ba2); }
        .avatar-purple { background: linear-gradient(135deg, #6C63FF, #A855F7); }
        .avatar-pink { background: linear-gradient(135deg, #EC4899, #F472B6); }
        .avatar-green { background: linear-gradient(135deg, #4CAF50, #66BB6A); }
        .avatar-orange { background: linear-gradient(135deg, #FF9800, #FFB74D); }
        .avatar-red { background: linear-gradient(135deg, #FF5252, #EF5350); }
        .avatar-teal { background: linear-gradient(135deg, #26A69A, #4DB6AC); }
        .avatar-indigo { background: linear-gradient(135deg, #5C6BC0, #7986CB); }

        .camera-badge {
            position: absolute; bottom: -2px; left: -2px; background: var(--primary); color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--card); cursor: pointer; transition: all 0.2s;
        }
        .camera-badge:hover { background: var(--primary-dark); transform: scale(1.1); }
        .camera-badge svg { width: 55%; height: 55%; fill: white; }

        /* ===== PROFILE SETTINGS ===== */
        .profile-settings { text-align: center; padding: 30px 20px; }
        .profile-settings .avatar-container { position: relative; display: inline-block; margin-bottom: 16px; }
        .profile-settings .avatar { cursor: pointer; transition: all 0.3s; border: 4px solid var(--card); box-shadow: 0 4px 20px rgba(108,99,255,0.2); }
        .profile-settings .avatar:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(108,99,255,0.35); }
        .profile-settings .camera-badge { width: 36px; height: 36px; border-width: 3px; }
        .change-photo-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 24px; border-radius: 25px; background: rgba(108,99,255,0.1); color: var(--primary); font-weight: 600; font-size: 0.9em; cursor: pointer; transition: all 0.2s; border: none; font-family: inherit; margin-top: 8px; }
        .change-photo-btn:hover { background: rgba(108,99,255,0.2); transform: translateY(-1px); }

        /* ===== LOGIN ===== */
        .login-page { min-height: 100dvh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #6C63FF 0%, #A855F7 50%, #EC4899 100%); padding: 20px; position: relative; overflow: hidden; }
        .login-page::before { content: ''; position: absolute; top: -50%; right: -50%; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%); }
        .login-card { background: var(--card); border-radius: 24px; padding: 40px 32px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); position: relative; z-index: 1; }
        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-logo .logo-icon { font-size: 3.5em; margin-bottom: 12px; display: block; }
        .login-logo h1 { font-size: 2em; font-weight: 800; background: linear-gradient(135deg, var(--primary), #A855F7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-logo p { color: var(--text-light); font-size: 0.95em; }

        /* ===== FORMS ===== */
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9em; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px 18px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 1em; font-family: inherit; transition: all 0.25s; background: #FAFAFA; color: var(--text); -webkit-appearance: none; appearance: none; }
        .form-group input:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(108,99,255,0.12); }
        .form-group input::placeholder { color: #BBB; }

        /* ===== BUTTONS ===== */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 28px; border: none; border-radius: var(--radius-sm); font-size: 1em; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.2s; text-decoration: none; white-space: nowrap; user-select: none; -webkit-user-select: none; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; width: 100%; box-shadow: 0 4px 15px rgba(108,99,255,0.3); }
        .btn-success { background: linear-gradient(135deg, var(--success), var(--success-dark)); color: white; }
        .btn-danger { background: linear-gradient(135deg, var(--danger), var(--danger-dark)); color: white; }
        .btn-warning { background: linear-gradient(135deg, var(--warning), var(--warning-dark)); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); width: 100%; }
        .btn-outline:hover { background: var(--primary); color: white; }
        .btn-ghost { background: rgba(108,99,255,0.08); color: var(--primary); }
        .btn-ghost:hover { background: rgba(108,99,255,0.15); }
        .btn-sm { padding: 10px 18px; font-size: 0.88em; }
        .btn-lg { padding: 18px 36px; font-size: 1.1em; }

        /* ===== APP LAYOUT ===== */
        .app-container { max-width: 960px; margin: 0 auto; padding: 16px; padding-bottom: calc(16px + var(--safe-bottom)); min-height: 100dvh; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; position: sticky; top: 12px; z-index: 100; }
        .header-logo { font-size: 1.3em; font-weight: 800; background: linear-gradient(135deg, var(--primary), #A855F7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-user { display: flex; align-items: center; gap: 8px; }
        .header-user-name { font-weight: 600; font-size: 0.9em; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ===== CARDS ===== */
        .card { background: var(--card); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); margin-bottom: 16px; }
        .card-title { font-size: 1.1em; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

        /* ===== BALANCE ===== */
        .balance-card { background: linear-gradient(135deg, var(--primary), #A855F7); color: white; border-radius: var(--radius-lg); padding: 28px 24px; text-align: center; margin-bottom: 20px; box-shadow: 0 8px 30px rgba(108,99,255,0.25); position: relative; overflow: hidden; }
        .balance-card::before { content: ''; position: absolute; top: -30%; left: -30%; width: 80%; height: 80%; background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%); }
        .balance-card.negative { background: linear-gradient(135deg, var(--danger), var(--danger-dark)); box-shadow: 0 8px 30px rgba(255,82,82,0.25); }
        .balance-card.positive { background: linear-gradient(135deg, var(--success), var(--success-dark)); box-shadow: 0 8px 30px rgba(76,175,80,0.25); }
        .balance-label { font-size: 0.9em; opacity: 0.85; margin-bottom: 6px; font-weight: 400; }
        .balance-amount { font-size: 2.6em; font-weight: 800; line-height: 1.1; direction: ltr; display: inline-block; }
        .balance-sub { margin-top: 14px; display: flex; justify-content: center; gap: 20px; font-size: 0.85em; opacity: 0.8; }
        .balance-sub span { display: flex; flex-direction: column; gap: 2px; }
        .balance-sub strong { font-size: 1.15em; opacity: 1; }

        /* ===== ACTIONS ===== */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
        .action-btn { padding: 22px 16px; border-radius: var(--radius); border: none; font-family: inherit; font-size: 1.05em; font-weight: 700; cursor: pointer; transition: all 0.25s; display: flex; flex-direction: column; align-items: center; gap: 8px; user-select: none; }
        .action-btn:active { transform: scale(0.96); }
        .action-btn.give { background: linear-gradient(135deg, #E8F5E9, #C8E6C9); color: #2E7D32; }
        .action-btn.receive { background: linear-gradient(135deg, #FFF3E0, #FFE0B2); color: #E65100; }
        .action-btn .icon { font-size: 2em; }

        /* ===== TRANSACTIONS ===== */
        .txn-list { list-style: none; }
        .txn-item { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); gap: 12px; }
        .txn-item:last-child { border-bottom: none; }
        .txn-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.15em; flex-shrink: 0; }
        .txn-icon.give { background: #E8F5E9; } .txn-icon.receive { background: #FFF3E0; }
        .txn-details { flex: 1; min-width: 0; }
        .txn-desc { font-weight: 600; font-size: 0.92em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .txn-date { color: var(--text-light); font-size: 0.8em; margin-top: 2px; }
        .txn-amount { font-weight: 700; font-size: 1.05em; direction: ltr; white-space: nowrap; flex-shrink: 0; }
        .txn-amount.give { color: var(--success); } .txn-amount.receive { color: var(--warning); }

        /* ===== ADMIN ===== */
        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .summary-card { background: var(--card); border-radius: var(--radius); padding: 18px 14px; text-align: center; box-shadow: var(--shadow); }
        .summary-value { font-size: 1.8em; font-weight: 800; direction: ltr; }
        .summary-label { color: var(--text-light); font-size: 0.78em; margin-top: 4px; }
        .summary-card.highlight { background: linear-gradient(135deg, var(--primary), #A855F7); color: white; }
        .summary-card.highlight .summary-label { color: rgba(255,255,255,0.8); }
        .member-card { display: flex; align-items: center; padding: 14px 16px; background: #F8F9FA; border-radius: var(--radius-sm); margin-bottom: 10px; gap: 12px; }
        .member-info { flex: 1; min-width: 0; }
        .member-name { font-weight: 600; font-size: 0.95em; }
        .member-stats { color: var(--text-light); font-size: 0.8em; margin-top: 2px; }
        .member-balance { font-weight: 800; font-size: 1.15em; direction: ltr; white-space: nowrap; flex-shrink: 0; }
        .member-balance.owes { color: var(--danger); } .member-balance.owed { color: var(--success); } .member-balance.zero { color: var(--text-light); }

        /* ===== TABS ===== */
        .tabs { display: flex; gap: 6px; margin-bottom: 18px; background: var(--card); padding: 5px; border-radius: var(--radius-sm); box-shadow: var(--shadow); overflow-x: auto; }
        .tab { flex: 1; min-width: max-content; padding: 11px 16px; text-align: center; border: none; background: none; border-radius: 8px; font-family: inherit; font-weight: 600; font-size: 0.88em; cursor: pointer; transition: all 0.2s; color: var(--text-light); white-space: nowrap; }
        .tab.active { background: var(--primary); color: white; box-shadow: 0 2px 8px rgba(108,99,255,0.3); }

        /* ===== MODAL ===== */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); z-index: 1000; align-items: flex-end; justify-content: center; padding: 0; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--card); border-radius: 24px 24px 0 0; padding: 28px 24px; padding-bottom: calc(28px + var(--safe-bottom)); width: 100%; max-width: 500px; max-height: 85dvh; overflow-y: auto; box-shadow: 0 -8px 30px rgba(0,0,0,0.15); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-handle { width: 40px; height: 4px; background: #DDD; border-radius: 2px; margin: 0 auto 20px; }
        .modal-title { font-size: 1.3em; font-weight: 700; margin-bottom: 20px; text-align: center; }
        .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
        .modal-actions .btn { flex: 1; }

        /* ===== TOAST ===== */
        .toast { position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(120px); background: #333; color: white; padding: 14px 28px; border-radius: 50px; font-weight: 500; font-size: 0.92em; z-index: 2000; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); white-space: nowrap; max-width: 90vw; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--success); } .toast.error { background: var(--danger); }
        .empty-state { text-align: center; padding: 36px 20px; color: var(--text-light); }
        .empty-state .icon { font-size: 2.8em; margin-bottom: 10px; }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 768px) {
            .app-container { padding: 24px; } .header { padding: 16px 24px; }
            .balance-card { padding: 36px 30px; } .balance-amount { font-size: 3.2em; }
            .action-btn { padding: 28px 20px; } .action-btn .icon { font-size: 2.4em; }
            .summary-grid { gap: 16px; } .summary-card { padding: 22px 18px; } .summary-value { font-size: 2.2em; }
            .modal { border-radius: 24px; padding: 32px; max-width: 440px; max-height: none; }
            .modal-handle { display: none; } .modal-overlay { align-items: center; padding: 20px; }
            .profile-settings .avatar.avatar-xl { width: 140px; height: 140px; font-size: 2.8em; }
        }
        @media (max-width: 480px) {
            .app-container { padding: 12px; } .header { padding: 12px 16px; } .header-user-name { display: none; }
            .balance-amount { font-size: 2.2em; } .action-btn { padding: 18px 12px; font-size: 0.95em; } .action-btn .icon { font-size: 1.7em; }
            .summary-grid { gap: 8px; } .summary-card { padding: 14px 10px; } .summary-value { font-size: 1.5em; }
            .profile-settings .avatar.avatar-xl { width: 100px; height: 100px; font-size: 2.2em; }
            .profile-settings { padding: 20px 16px; }
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #1A1A2E; --card: #252540; --text: #E8E8F0; --text-light: #999; --border: #333355; --shadow: 0 2px 12px rgba(0,0,0,0.2); }
            .form-group input { background: #2A2A45; } .form-group input:focus { background: #303050; }
            .member-card { background: #2A2A45; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <div class="login-logo"><span class="logo-icon">👨‍👩‍👧‍👦</span><h1>משפחביט</h1><p>ניהול כספים משפחתי</p></div>
            <div class="form-group"><label>שם משתמש</label><input type="text" id="usernameInput" placeholder="שם משתמש" autocomplete="username"></div>
            <div class="form-group"><label>סיסמה</label><input type="password" id="passwordInput" placeholder="סיסמה" autocomplete="current-password"></div>
            <button class="btn btn-primary btn-lg" onclick="login()">התחבר</button>
            <div id="loginError" style="color:var(--danger);margin-top:16px;text-align:center;font-weight:600;font-size:0.9em;"></div>
        </div>
    </div>

    <!-- MEMBER APP -->
    <div id="memberApp" class="hidden">
        <div class="app-container">
            <div class="header">
                <span class="header-logo">👨‍👩‍👧‍👦 משפחביט</span>
                <div class="header-user">
                    <div id="memberAvatar" class="avatar avatar-sm"><span class="initials"></span></div>
                    <span id="memberName" class="header-user-name"></span>
                    <button class="btn btn-ghost btn-sm" onclick="logout()">יציאה</button>
                </div>
            </div>
            <div class="card profile-settings">
                <div class="avatar-container">
                    <div id="memberBigAvatar" class="avatar avatar-xl avatar-purple">
                        <span class="initials"></span>
                        <div class="camera-badge" onclick="document.getElementById('avatarInput').click()">
                            <svg viewBox="0 0 24 24"><path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4zm9-7.2h-2.6L16.5 5H7.5L5.6 8H3c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2z"/></svg>
                        </div>
                    </div>
                    <input type="file" id="avatarInput" accept="image/*" onchange="uploadAvatar(event)">
                </div>
                <button class="change-photo-btn" onclick="document.getElementById('avatarInput').click()">📷 שנה תמונת פרופיל</button>
            </div>
            <div class="balance-card" id="memberBalanceCard">
                <div class="balance-label">האלאנס שלך מול הקופה</div>
                <div class="balance-amount" id="memberBalance">₪0</div>
                <div class="balance-sub"><span>נתת <strong id="memberGiven">₪0</strong></span><span>קיבלת <strong id="memberReceived">₪0</strong></span></div>
            </div>
            <div class="action-grid">
                <button class="action-btn give" onclick="openModal('give')"><span class="icon">💸</span>נתתי לקופה</button>
                <button class="action-btn receive" onclick="openModal('receive')"><span class="icon">💰</span>קיבלתי מהקופה</button>
            </div>
            <div class="card"><div class="card-title">📋 היסטוריית תנועות</div><ul id="memberTxnList" class="txn-list"></ul></div>
        </div>
    </div>

    <!-- ADMIN APP -->
    <div id="adminApp" class="hidden">
        <div class="app-container">
            <div class="header">
                <span class="header-logo">👨‍👩‍👧‍👦 משפחביט — לוח בקרה</span>
                <div class="header-user"><div class="avatar avatar-sm avatar-purple"><span class="initials">👑</span></div><button class="btn btn-ghost btn-sm" onclick="logout()">יציאה</button></div>
            </div>
            <div class="summary-grid" id="adminSummary"></div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('members',this)">👥 בני משפחה</button>
                <button class="tab" onclick="switchTab('transactions',this)">📋 תנועות</button>
                <button class="tab" onclick="switchTab('add',this)">➕ הוסף</button>
            </div>
            <div id="tab-members"><div id="adminMemberList"></div></div>
            <div id="tab-transactions" class="hidden"><div class="card"><div class="card-title">📋 כל התנועות</div><ul id="adminTxnList" class="txn-list"></ul></div></div>
            <div id="tab-add" class="hidden">
                <div class="card">
                    <div class="card-title">➕ הוסף בן משפחה</div>
                    <div class="avatar-upload">
                        <div id="newUserAvatar" class="avatar avatar-lg avatar-purple" onclick="document.getElementById('newUserAvatarInput').click()">
                            <span class="initials">?</span>
                            <div class="camera-badge" style="width:28px;height:28px;"><svg viewBox="0 0 24 24"><path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4zm9-7.2h-2.6L16.5 5H7.5L5.6 8H3c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2z"/></svg></div>
                        </div>
                        <input type="file" id="newUserAvatarInput" accept="image/*" onchange="previewNewUserAvatar(event)">
                        <span class="upload-hint">הוסף תמונת פרופיל (אופציונלי)</span>
                    </div>
                    <div class="form-group"><label>שם מלא</label><input type="text" id="newDisplayName" placeholder="שם מלא"></div>
                    <div class="form-group"><label>שם משתמש</label><input type="text" id="newUsername" placeholder="שם משתמש"></div>
                    <div class="form-group"><label>סיסמה</label><input type="password" id="newPassword" placeholder="סיסמה"></div>
                    <button class="btn btn-primary" onclick="addUser()">הוסף בן משפחה</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="txnModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <div class="modal-handle"></div>
            <div class="modal-title" id="modalTitle">תנועה חדשה</div>
            <div class="form-group"><label>סכום (₪)</label><input type="number" id="txnAmount" placeholder="0" min="0.01" step="0.01" inputmode="decimal"></div>
            <div class="form-group"><label>תיאור (אופציונלי)</label><input type="text" id="txnDescription" placeholder="למה זה?"></div>
            <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">ביטול</button><button class="btn btn-primary" id="modalSubmit" onclick="submitTransaction()">אשר תנועה</button></div>
        </div>
    </div>
    <div id="toast" class="toast"></div>

<script>
const API = '';
let currentUser = null, currentToken = localStorage.getItem('token'), txnType = 'give';
const AVATAR_COLORS = ['avatar-blue','avatar-purple','avatar-pink','avatar-green','avatar-orange','avatar-red','avatar-teal','avatar-indigo'];

function showToast(msg, type='') { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+type+' show'; setTimeout(()=>t.className='toast',3000); }
function formatMoney(n) { return '₪'+Math.abs(n).toLocaleString('he-IL',{minimumFractionDigits:0,maximumFractionDigits:2}); }
function formatDate(d) { return new Date(d).toLocaleDateString('he-IL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
function getInitials(n) { return n.split(' ').map(w=>w[0]).join('').substring(0,2); }
function avatarColor(id) { return AVATAR_COLORS[id % AVATAR_COLORS.length]; }

function renderAvatar(el, user, sizeClass) {
    if (!user) return;
    const hasImg = user.avatar_url && user.avatar_url !== '';
    const initials = getInitials(user.display_name || user.username);
    const color = avatarColor(user.id);
    el.className = 'avatar ' + sizeClass + ' ' + color;
    el.innerHTML = hasImg ? '<img src="'+user.avatar_url+'" alt="'+user.display_name+'">' : '<span class="initials">'+initials+'</span>';
}

async function api(method, path, body=null, isForm=false) {
    const opts = { method };
    if (currentToken) opts.headers = { ...opts.headers, 'Authorization': 'Bearer '+currentToken };
    if (!isForm && body) { opts.headers = { ...opts.headers, 'Content-Type': 'application/json' }; opts.body = JSON.stringify(body); }
    if (isForm) opts.body = body;
    const res = await fetch(API+path, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'שגיאה');
    return data;
}

async function login() {
    const u=document.getElementById('usernameInput').value.trim(), p=document.getElementById('passwordInput').value;
    if(!u||!p){document.getElementById('loginError').textContent='מלא את כל השדות';return;}
    try { const d=await api('POST','/api/login',{username:u,password:p}); currentToken=d.token; currentUser=d.user; localStorage.setItem('token',currentToken); document.getElementById('loginPage').classList.add('hidden'); if(currentUser.role==='admin')showAdminApp(); else showMemberApp(); } catch(e){document.getElementById('loginError').textContent=e.message;}
}
document.getElementById('passwordInput').addEventListener('keydown',e=>{if(e.key==='Enter')login();});

function logout() { currentToken=null; currentUser=null; localStorage.removeItem('token'); document.getElementById('memberApp').classList.add('hidden'); document.getElementById('adminApp').classList.add('hidden'); document.getElementById('loginPage').classList.remove('hidden'); document.getElementById('usernameInput').value=''; document.getElementById('passwordInput').value=''; document.getElementById('loginError').textContent=''; }

// ===== MEMBER =====
async function showMemberApp() {
    document.getElementById('memberApp').classList.remove('hidden');
    renderAvatar(document.getElementById('memberAvatar'), currentUser, 'avatar-sm');
    renderAvatar(document.getElementById('memberBigAvatar'), currentUser, 'avatar-xl');
    document.getElementById('memberName').textContent=currentUser.display_name;
    await loadMemberData();
}

async function loadMemberData() {
    try {
        const [balance,txns] = await Promise.all([api('GET','/api/member/balance'), api('GET','/api/member/transactions')]);
        const bal=balance.balance;
        document.getElementById('memberBalanceCard').className='balance-card '+(bal>0?'negative':bal<0?'positive':'');
        document.getElementById('memberBalance').textContent=(bal>0?'-':bal<0?'+':'')+formatMoney(bal);
        document.getElementById('memberGiven').textContent=formatMoney(balance.given);
        document.getElementById('memberReceived').textContent=formatMoney(balance.received);
        const list=document.getElementById('memberTxnList');
        if(!txns.length){list.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>אין תנועות עדיין</p></div>';}
        else{list.innerHTML=txns.map(t=>'<li class="txn-item"><div class="txn-icon '+t.type+'">'+(t.type==='give'?'💸':'💰')+'</div><div class="txn-details"><div class="txn-desc">'+(t.description||(t.type==='give'?'העברה לקופה':'קבלה מהקופה'))+'</div><div class="txn-date">'+formatDate(t.created_at)+'</div></div><div class="txn-amount '+t.type+'">'+(t.type==='give'?'+':'−')+formatMoney(t.amount)+'</div></li>').join('');}
    } catch(e){if(e.message.includes('auth')||e.message.includes('token'))logout();}
}

async function uploadAvatar(event) {
    const file=event.target.files[0]; if(!file) return;
    if(file.size>5*1024*1024){showToast('הקובץ גדול מדי (מקסימום 5MB)','error');return;}
    try {
        const fd=new FormData(); fd.append('avatar',file);
        const d=await api('POST','/api/avatar',fd,true);
        currentUser.avatar_url=d.avatar_url;
        renderAvatar(document.getElementById('memberAvatar'),currentUser,'avatar-sm');
        renderAvatar(document.getElementById('memberBigAvatar'),currentUser,'avatar-xl');
        showToast('תמונת הפרופיל עודכנה!','success');
    } catch(e){showToast(e.message,'error');}
}

// ===== ADMIN =====
async function showAdminApp() { document.getElementById('adminApp').classList.remove('hidden'); await loadAdminData(); }

async function loadAdminData() {
    try {
        const [dash,txns]=await Promise.all([api('GET','/api/admin/dashboard'),api('GET','/api/admin/transactions')]);
        document.getElementById('adminSummary').innerHTML='<div class="summary-card highlight"><div class="summary-value">'+dash.members.length+'</div><div class="summary-label">בני משפחה</div></div><div class="summary-card"><div class="summary-value" style="color:var(--success)">'+formatMoney(dash.total_owed)+'</div><div class="summary-label">סה"כ חוב לקופה</div></div><div class="summary-card"><div class="summary-value">'+txns.length+'</div><div class="summary-label">תנועות</div></div>';
        const mL=document.getElementById('adminMemberList');
        if(!dash.members.length){mL.innerHTML='<div class="empty-state"><div class="icon">👥</div><p>אין בני משפחה</p></div>';}
        else{mL.innerHTML=dash.members.map(m=>{
            const b=m.balance; const c=b>0?'owes':b<0?'owed':'zero'; const t=b>0?'חייב '+formatMoney(b):b<0?'זכאי '+formatMoney(b):'מאוזן';
            return '<div class="member-card"><div class="avatar avatar-md '+avatarColor(m.id)+'"><span class="initials">'+getInitials(m.display_name)+'</span></div><div class="member-info"><div class="member-name">'+m.display_name+'</div><div class="member-stats">נתן: '+formatMoney(m.total_given)+' · קיבל: '+formatMoney(m.total_received)+'</div></div><div class="member-balance '+c+'">'+t+'</div></div>';
        }).join('');}
        const tL=document.getElementById('adminTxnList');
        if(!txns.length){tL.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>אין תנועות</p></div>';}
        else{tL.innerHTML=txns.map(t=>'<li class="txn-item"><div class="avatar avatar-xs '+avatarColor(t.user_id)+'"><span class="initials">'+getInitials(t.display_name)+'</span></div><div class="txn-details"><div class="txn-desc"><strong>'+t.display_name+'</strong> — '+(t.description||(t.type==='give'?'העברה לקופה':'קבלה מהקופה'))+'</div><div class="txn-date">'+formatDate(t.created_at)+'</div></div><div class="txn-amount '+t.type+'">'+(t.type==='give'?'+':'−')+formatMoney(t.amount)+'</div></li>').join('');}
    } catch(e){if(e.message.includes('auth')||e.message.includes('token'))logout();}
}

function switchTab(tab,el) { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); document.getElementById('tab-members').classList.toggle('hidden',tab!=='members'); document.getElementById('tab-transactions').classList.toggle('hidden',tab!=='transactions'); document.getElementById('tab-add').classList.toggle('hidden',tab!=='add'); }

function previewNewUserAvatar(event) {
    const file=event.target.files[0]; if(!file) return;
    const reader=new FileReader(); reader.onload=e=>{
        const el=document.getElementById('newUserAvatar');
        el.className='avatar avatar-lg'; el.innerHTML='<img src="'+e.target.result+'">';
    }; reader.readAsDataURL(file);
}

async function addUser() {
    const dn=document.getElementById('newDisplayName').value.trim(), u=document.getElementById('newUsername').value.trim(), p=document.getElementById('newPassword').value;
    if(!dn||!u||p){showToast('מלא את כל השדות','error');return;}
    try {
        const d=await api('POST','/api/admin/user',{username:u,password:p,display_name:dn});
        // Upload avatar if selected
        const avatarFile=document.getElementById('newUserAvatarInput').files[0];
        if(avatarFile && d.user) {
            const fd=new FormData(); fd.append('avatar',avatarFile);
            await api('POST','/api/admin/avatar/'+d.user.id,fd,true);
        }
        showToast('בן המשפחה נוסף!','success');
        document.getElementById('newDisplayName').value=''; document.getElementById('newUsername').value=''; document.getElementById('newPassword').value='';
        document.getElementById('newUserAvatarInput').value='';
        document.getElementById('newUserAvatar').className='avatar avatar-lg avatar-purple';
        document.getElementById('newUserAvatar').innerHTML='<span class="initials">?</span>';
        loadAdminData();
    } catch(e){showToast(e.message,'error');}
}

// ===== MODAL =====
function openModal(type) {
    txnType=type; const g=type==='give';
    document.getElementById('modalTitle').textContent=g?'💸 נתתי לקופה':'💰 קיבלתי מהקופה';
    const s=document.getElementById('modalSubmit'); s.className='btn '+(g?'btn-success':'btn-warning'); s.textContent=g?'אשר העברה':'אשר קבלה';
    document.getElementById('txnAmount').value=''; document.getElementById('txnDescription').value='';
    document.getElementById('txnModal').classList.add('active');
    setTimeout(()=>document.getElementById('txnAmount').focus(),150);
}
function closeModal() { document.getElementById('txnModal').classList.remove('active'); }
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

async function submitTransaction() {
    const a=parseFloat(document.getElementById('txnAmount').value), d=document.getElementById('txnDescription').value.trim();
    if(!a||a<=0){showToast('הכנס סכום תקיף','error');return;}
    try { await api('POST','/api/member/transaction',{type:txnType,amount:a,description:d}); closeModal(); showToast('התנועה נשמרה!','success'); loadMemberData(); } catch(e){showToast(e.message,'error');}
}

// ===== INIT =====
async function init() {
    if(currentToken) {
        try { const me=await api('GET','/api/me'); currentUser=me.user; document.getElementById('loginPage').classList.add('hidden'); if(currentUser.role==='admin')showAdminApp(); else showMemberApp(); } catch(e){logout();}
    }
}
init();
</script>
</body>
</html>
