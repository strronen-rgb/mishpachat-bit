services:
  - type: web
    name: mishpachat-bit
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: mishpachat-data
      mountPath: /opt/render/project/src
      sizeGB: 1
